services:
  backend:
    build: ./green-dev-backend
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - METRICS_API_TOKEN=${METRICS_API_TOKEN}
    container_name: green-backend
    restart: unless-stopped
    volumes:
      - green_metrics_data:/app/data

  frontend:
    build: ./green-dev-dashboard
    ports:
      - "80:80"
    container_name: green-frontend
    restart: unless-stopped

volumes:
  green_metrics_data:
